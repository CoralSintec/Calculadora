<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerencia Coralsintec</title>
    <style>
        :root { --p: #1e2328; --border: #cbd5e1; --blue: #3b82f6; --green: #10b981; --red: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .app-main { width: 100%; max-width: 600px; margin: 0 auto; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-volver { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--p);}
        .user-badge { background: #fef08a; color: #854d0e; border: 1px solid #fde047; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        
        .header { background: var(--p); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .kpi-title { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .kpi-val { font-size: 24px; font-weight: 900; }
        .val-blue { color: var(--blue); }
        .val-red { color: var(--red); }
        .val-green { color: var(--green); }
        
        .kpi-full { grid-column: span 2; background: var(--p); color: white; }
        .kpi-full .kpi-title { color: #cbd5e1; }
        .kpi-full .kpi-val { color: #fde047; font-size: 32px; }

        .section-title { font-size: 14px; font-weight: 800; color: var(--p); text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 5px;}
        
        .list-card { background: white; border-radius: 10px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
        .list-monto { font-size: 15px; font-weight: 900; }

        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(243, 244, 246, 0.95); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: var(--p); font-size: 18px;}
    </style>
</head>
<body>
    <div id="loader-overlay"><span style="font-size: 30px; margin-bottom:10px;">📊</span>Calculando Finanzas...</div>
    
    <main class="app-main">
        <div class="top-bar">
            <button class="btn-volver" onclick="location.href='index.html'">⬅ MENÚ</button>
            <div class="user-badge">👑 MODO GERENTE</div>
        </div>

        <div class="header">
            <h2 style="margin:0; letter-spacing: 1px;">PANEL FINANCIERO</h2>
            <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Balance General Coralsintec</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-title">Ventas Brutas</div>
                <div class="kpi-val val-blue" id="kpi-ventas">$0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Costos Fijos</div>
                <div class="kpi-val val-red" id="kpi-costos">$0</div>
            </div>
            <div class="kpi-card kpi-full">
                <div class="kpi-title">Balance Operativo Estimado</div>
                <div class="kpi-val" id="kpi-balance">$0</div>
            </div>
        </div>

        <div class="section-title">Nómina y Operativos</div>
        <div id="lista-nomina"></div>

    </main>

<script>
    // TU LLAVE MAESTRA
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";
    
    // SEGURIDAD: SI NO ES EDUARDO, LO SACAMOS DE AQUÍ
    window.onload = () => {
        const usuarioActual = localStorage.getItem('usuarioCoralsintec');
        if(usuarioActual !== 'EDUARDO') {
            alert("⚠️ ACCESO DENEGADO. Área exclusiva de Gerencia.");
            window.location.href = 'index.html';
            return;
        }
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            // Pedimos Ventas y Nómina al mismo tiempo
            const [resPedidos, resNomina] = await Promise.all([
                fetch(API_URL + "?action=get_pedidos&t=" + new Date().getTime()),
                fetch(API_URL + "?action=get_nomina&t=" + new Date().getTime())
            ]);

            const pedidos = await resPedidos.json();
            const nomina = await resNomina.json();

            procesarFinanzas(pedidos, nomina);
            
            document.getElementById('loader-overlay').style.display = 'none';
        } catch (e) {
            alert("Error al cargar los datos financieros.");
            document.getElementById('loader-overlay').style.display = 'none';
        }
    }

    function procesarFinanzas(pedidos, nomina) {
        // 1. Sumar todas las ventas activas
        let totalVentas = 0;
        pedidos.forEach(p => {
            let monto = parseFloat(p.TOTAL_USD || p['TOTAL USD'] || p.TOTAL || 0);
            totalVentas += monto;
        });

        // 2. Sumar costos fijos (Nomina y Galpón)
        let totalCostos = 0;
        let htmlNomina = "";
        
        nomina.forEach(n => {
            let monto = parseFloat(n.MONTO_MENSUAL_USD || 0);
            totalCostos += monto;
            let icono = n.CATEGORIA === 'Nomina' ? '👷‍♂️' : '🏢';
            
            htmlNomina += `
                <div class="list-card">
                    <div>${icono} ${n.NOMBRE}</div>
                    <div class="list-monto" style="color: #ef4444;">-$${monto}</div>
                </div>
            `;
        });

        // 3. Imprimir en pantalla
        document.getElementById('kpi-ventas').innerText = "$" + totalVentas.toFixed(2);
        document.getElementById('kpi-costos').innerText = "$" + totalCostos.toFixed(2);
        
        let balance = totalVentas - totalCostos;
        document.getElementById('kpi-balance').innerText = "$" + balance.toFixed(2);
        
        // Cambiar color del balance si es negativo
        if(balance < 0) document.getElementById('kpi-balance').style.color = "#ef4444";

        document.getElementById('lista-nomina').innerHTML = htmlNomina;
    }
</script>
</body>
</html>
