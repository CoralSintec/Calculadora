<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerencia Coralsintec</title>
    <style>
        :root { --p: #1e2328; --a: #c49660; --bg: #f1f5f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-main { width: 100%; max-width: 500px; margin: 0 auto; }
        
        /* TABS */
        .tabs { display: flex; background: white; border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--p); color: white; }

        .header { background: var(--p); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .section { display: none; }
        .section.active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info b { display: block; font-size: 14px; color: var(--p); }
        .info span { font-size: 11px; color: #64748b; }
        .price { font-size: 16px; font-weight: 900; color: #10b981; margin-right: 10px; }
        
        .btn-edit { background: #f1f5f9; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader">📊 Sincronizando Finanzas...</div>

    <main class="app-main">
        <button onclick="location.href='index.html'" style="margin-bottom:10px; background:none; border:none; font-weight:bold; cursor:pointer;">⬅ MENÚ PRINCIPAL</button>
        
        <div class="header">
            <h2 style="margin:0;">CORALSINTEC</h2>
            <div style="font-size:12px; opacity:0.8;">Panel Administrativo de Control</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('resumen', this)">Resumen</button>
            <button class="tab-btn" onclick="showTab('nomina', this)">Nómina</button>
            <button class="tab-btn" onclick="showTab('materiales', this)">Materiales</button>
            <button class="tab-btn" onclick="showTab('gastos', this)">Gastos</button>
        </div>

        <div id="resumen" class="section active">
            <div class="card" style="background: var(--p); color: white;">
                <div><b>Caja Estimada (Ventas)</b><span>Basado en pedidos activos</span></div>
                <div class="price" id="total-ventas" style="color:#fde047;">$0</div>
            </div>
        </div>

        <div id="nomina" class="section">
            <div id="list-nomina"></div>
        </div>

        <div id="materiales" class="section">
            <div id="list-materiales"></div>
        </div>

        <div id="gastos" class="section">
            <div id="list-gastos"></div>
        </div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";

    window.onload = () => {
        if(localStorage.getItem('usuarioCoralsintec') !== 'EDUARDO') {
            location.href = 'index.html';
            return;
        }
        cargarTodo();
    };

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function cargarTodo() {
        document.getElementById('loader').style.display = 'flex';
        const [rP, rN, rI] = await Promise.all([
            fetch(API_URL + "?action=get_pedidos&t=" + Date.now()).then(r => r.json()),
            fetch(API_URL + "?action=get_nomina&t=" + Date.now()).then(r => r.json()),
            fetch(API_URL + "?action=get_inventario&t=" + Date.now()).then(r => r.json())
        ]);

        // Ventas
        let v = rP.reduce((acc, p) => acc + parseFloat(p.TOTAL_USD || 0), 0);
        document.getElementById('total-ventas').innerText = "$" + v.toFixed(2);

        // Nómina
        document.getElementById('list-nomina').innerHTML = rN.filter(n => n.CATEGORIA === 'Nomina').map(n => `
            <div class="card">
                <div class="info"><b>${n.NOMBRE}</b><span>Sueldo Mensual</span></div>
                <div style="display:flex; align-items:center;">
                    <div class="price">$${n.MONTO_MENSUAL_USD}</div>
                    <button class="btn-edit" onclick="editar('NOMINA_FIJOS', 'NOMBRE', '${n.NOMBRE}', 2, '${n.MONTO_MENSUAL_USD}')">✏️</button>
                </div>
            </div>
        `).join('');

        // Gastos Operativos
        document.getElementById('list-gastos').innerHTML = rN.filter(n => n.CATEGORIA === 'Operativo').map(n => `
            <div class="card">
                <div class="info"><b>${n.NOMBRE}</b><span>Gasto Fijo</span></div>
                <div style="display:flex; align-items:center;">
                    <div class="price">$${n.MONTO_MENSUAL_USD}</div>
                    <button class="btn-edit" onclick="editar('NOMINA_FIJOS', 'NOMBRE', '${n.NOMBRE}', 2, '${n.MONTO_MENSUAL_USD}')">✏️</button>
                </div>
            </div>
        `).join('');

        // Materiales
        document.getElementById('list-materiales').innerHTML = rI.map(m => `
            <div class="card">
                <div class="info"><b>${m.MATERIAL}</b><span>Costo por ${m.UNIDAD_MEDIDA}</span></div>
                <div style="display:flex; align-items:center;">
                    <div class="price">$${m.COSTO_UNITARIO_USD}</div>
                    <button class="btn-edit" onclick="editar('INVENTARIO_COSTOS', 'MATERIAL', '${m.MATERIAL}', 2, '${m.COSTO_UNITARIO_USD}')">✏️</button>
                </div>
            </div>
        `).join('');

        document.getElementById('loader').style.display = 'none';
    }

    async function editar(hoja, colBusqueda, id, colEditar, actual) {
        let nuevo = prompt("Actualizar valor para " + id + ":", actual);
        if(nuevo === null || nuevo === actual || isNaN(nuevo)) return;

        document.getElementById('loader').style.display = 'flex';
        await fetch(API_URL + "?action=editar_registro", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ hoja, col_busqueda: (colBusqueda === 'NOMBRE' ? 1 : 0), id, col_editar: colEditar, nuevo_valor: nuevo })
        });
        
        setTimeout(() => { cargarTodo(); }, 1500);
    }
</script>
</body>
</html>
