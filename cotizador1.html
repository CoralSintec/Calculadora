<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Maestro Coralsintec 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: var(--primary); }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .result-card { margin-top: 30px; padding: 20px; background: #ecf0f1; border-left: 5px solid var(--accent); border-radius: 8px; }
        .price-tag { font-size: 2.2em; font-weight: bold; color: var(--accent); text-align: center; margin: 10px 0; }
        .footer-note { font-size: 0.8em; color: #7f8c8d; text-align: center; margin-top: 20px; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Coralsintec | Cotizador 2026</h1>
    
    <div class="grid">
        <div>
            <label>Formato de Pieza</label>
            <select id="formato" onchange="actualizarOpciones()">
                </select>
        </div>
        <div>
            <label>Textura de Acabado</label>
            <select id="textura" onchange="calcular()"></select>
        </div>
        <div>
            <label>Color Deseado</label>
            <select id="color" onchange="calcular()"></select>
        </div>
        <div>
            <label>Área a Cubrir (m²)</label>
            <input type="number" id="cantidad" value="1" min="1" oninput="calcular()">
        </div>
    </div>

    <div class="result-card" id="resultado">
        <div style="text-align: center; font-weight: bold;">PRECIO UNITARIO ESTIMADO</div>
        <div class="price-tag" id="precioUnitario">$ 0.00</div>
        <div style="display: flex; justify-content: space-between; border-top: 1px solid #bdc3c7; pt: 10px;">
            <span>Total Presupuesto:</span>
            <span id="totalVenta" style="font-weight: bold;">$ 0.00</span>
        </div>
    </div>

    <button class="btn-print" onclick="window.print()">Generar PDF / Imprimir</button>
    <div class="footer-note">Precios incluyen gestión logística de pigmentos (15% handling fee).</div>
</div>

<script>
    // URL de tu Google Sheets publicado como CSV
    const URL_DB = "TU_URL_DE_GOOGLE_SHEETS_AQUÍ_EN_FORMATO_CSV";
    let database = [];

    // Cargar Base de Datos al Iniciar
    window.onload = async function() {
        // Para pruebas rápidas, si no tienes el CSV aún, cargamos una lógica base
        initApp();
    };

    function initApp() {
        const formatos = ["30x30", "40x40", "50x50", "60x60", "20x60", "30x60", "15x75", "30x100", "Borde de Piscina Cuadrado 30x100", "Huellas Plantadas 30x60"];
        const selectFormato = document.getElementById('formato');
        formatos.forEach(f => { let opt = new Option(f, f); selectFormato.add(opt); });

        const colores = ["Gris Claro", "Beige", "Gris 1%", "Gris 2%", "Gris 3%", "Deep Black", "Azul 1%", "Rojo 1%", "Verde 1%"];
        const selectColor = document.getElementById('color');
        colores.forEach(c => { let opt = new Option(c, c); selectColor.add(opt); });

        const texturas = ["Media", "Lisa", "Gruesa", "Veta"];
        const selectTextura = document.getElementById('textura');
        texturas.forEach(t => { let opt = new Option(t, t); selectTextura.add(opt); });

        actualizarOpciones();
    }

    function actualizarOpciones() {
        // Regla de Negocio: Veta solo disponible para Beige
        const color = document.getElementById('color').value;
        const textura = document.getElementById('textura').value;
        
        if (textura === "Veta") {
            document.getElementById('color').value = "Beige";
        }
        calcular();
    }

    function calcular() {
        const formato = document.getElementById('formato').value;
        const color = document.getElementById('color').value;
        const textura = document.getElementById('textura').value;
        const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;

        // LÓGICA FINANCIERA CORALSINTEC 2026
        let base = 20; // Base Piso 2.2cm
        let espesor = "2.2 cm";

        // Ajuste Base por espesor/formato
        if (formato.includes("1.2cm") || formato === "30x30" || formato === "40x40") { base = 18; espesor = "1.2 cm"; }
        if (formato.includes("Huellas")) { base = 18; espesor = "5.0 cm"; }

        // Recargo por Textura Lisa
        let plusTextura = 0;
        if (textura === "Lisa") { plusTextura = (espesor === "1.2 cm") ? 2 : 5; }

        // CÁLCULO DE PIGMENTO + 15% GESTIÓN
        let plusColor = 0;
        const gestion = 1.15;
        
        const costosKg = { "Deep Black": 40, "Azul": 35, "Rojo": 35, "Verde": 35, "Gris": 35 };

        if (color !== "Gris Claro" && color !== "Beige") {
            let nombreBase = color.split(' ')[0];
            let precioKg = costosKg[nombreBase] || 35;
            let porcentaje = parseInt(color.match(/\d+/)) || 1;
            
            // Factor consumo m2
            let factorConsumo = 1; 
            if (espesor === "1.2 cm") factorConsumo = 0.6;
            if (espesor === "5.0 cm") factorConsumo = 2.5;

            // Fórmula: (PrecioKg * GramosBase * %) / 5m2 * Factor * Gestión
            plusColor = (precioKg * 0.250 * porcentaje / 5) * factorConsumo * gestion;
        } else if (color === "Beige") {
            plusColor = 3; // Cemento Blanco
        }

        let precioUnitario = Math.round(base + plusTextura + plusColor);
        let total = precioUnitario * cantidad;

        document.getElementById('precioUnitario').innerText = `$ ${precioUnitario.toFixed(2)}`;
        document.getElementById('totalVenta').innerText = `$ ${total.toFixed(2)}`;
    }
</script>

</body>
</html>
