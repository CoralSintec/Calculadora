<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotizador Coralsintec</title>
    <style>
        :root { --p: #1e2328; --a: #c49660; --b: #cbd5e1; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #9baec0 0%, #7a91a6 100%); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; box-sizing: border-box; border-top: 6px solid var(--p); }
        .h-small { background: var(--p); color: white; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: bold; margin: 15px 0; text-transform: uppercase; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--b); border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-weight: 600; font-family: inherit;}
        .row { display: flex; gap: 10px; }
        .card-res { background: var(--p); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; }
        .btn { width: 100%; background: var(--a); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .cart { background: white; padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; margin-top: 15px; box-sizing: border-box; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: var(--p);}
    </style>
</head>
<body>
    <div id="loader"><span style="font-size: 24px; margin-bottom:10px;">⚙️</span>Sincronizando Cerebro...</div>
    
    <main class="app">
        <h2 style="text-align:center; margin:0; color:var(--p);">CORALSINTEC</h2>
        
        <div class="h-small">1. Datos del Cliente</div>
        <input type="text" id="c_nombre" placeholder="Nombre / Proyecto">
        <div class="row">
            <input type="text" id="c_rif" placeholder="RIF/CI" style="flex:1;">
            <input type="tel" id="c_tlf" placeholder="Teléfono" style="flex:1;">
        </div>
        <textarea id="c_ubi" placeholder="Ubicación de obra..." rows="2"></textarea>

        <div class="h-small">2. Calculadora</div>
        <select id="formato" onchange="calc()"><option value="30x30">30x30</option><option value="60x60">60x60</option><option value="30x60">30x60</option></select>
        <div class="row">
            <select id="uso" onchange="calc()"><option value="Pared">Pared</option><option value="Piso">Piso</option></select>
            <select id="textura" onchange="calc()"><option value="Media">Media</option><option value="Lisa">Lisa</option><option value="Gruesa">Gruesa</option></select>
        </div>
        <select id="color" onchange="calc()"><option value="Gris Claro">Gris Claro</option><option value="Beige">Beige</option><option value="Gris 1%">Gris 1%</option><option value="Gris 3%">Gris 3%</option></select>
        <input type="number" id="m2" value="10" oninput="calc()">

        <div class="card-res">
            <div style="font-size:12px; color:#94a3b8;">PRECIO DETECTADO</div>
            <div id="ui_precio" style="font-size:28px; color:var(--a); font-weight:bold;">$0.00</div>
            <div id="ui_total" style="font-size:14px; margin-top:5px;">Total Item: $0.00</div>
        </div>
        <button class="btn" onclick="add()">+ Agregar a la Lista</button>
    </main>

    <div class="cart" id="cart_sec" style="display:none;">
        <h3 style="margin:0; color:var(--p);">Resumen del Pedido</h3>
        <div id="lista" style="margin-top:10px;"></div>
        <hr style="border: 1px solid #eee; margin:15px 0;">
        <div style="text-align:right; font-weight:bold; font-size:20px; color:var(--p);">Total: $<span id="g_total">0</span></div>
        <button class="btn" style="background:#10b981;" onclick="enviar()">📤 ENVIAR ORDEN</button>
    </div>

<script>
    // TU LLAVE MAESTRA ESTÁ AQUÍ
    const API_URL = "https://script.google.com/macros/s/AKfycbxQbx8F5XiFhhQKt9yHEP5a2cU-WBTcQbjHiuqMjaYpXRyxKX_ISz-SIqqJzsn-1V8nCQ/exec";
    
    let db = []; let carrito = []; let actual = null;

    window.onload = () => {
        fetch(API_URL + "?action=get_productos").then(r => r.json()).then(data => {
            db = data; document.getElementById('loader').style.display = 'none'; calc();
        }).catch(e => {
            alert("Error de conexión. Recarga la página."); document.getElementById('loader').style.display = 'none';
        });
    };

    function calc() {
        if(!db.length) return;
        let f = document.getElementById('formato').value, u = document.getElementById('uso').value,
            t = document.getElementById('textura').value, c = document.getElementById('color').value,
            m = parseFloat(document.getElementById('m2').value) || 0;
        
        let match = db.find(p => p.FORMATO == f && p.USO == u && p.TEXTURA == t && p.COLOR == c);
        if(match) {
            actual = match;
            let p = parseFloat(match.PRECIO_USD);
            document.getElementById('ui_precio').innerText = "$" + p.toFixed(2);
            document.getElementById('ui_total').innerText = "Total Item: $" + (p * m).toFixed(2);
        } else {
            actual = null; 
            document.getElementById('ui_precio').innerText = "N/D";
            document.getElementById('ui_total').innerText = "Combinación no disponible";
        }
    }

    function add() {
        if(!actual) return alert("Producto no disponible en el catálogo.");
        let m = parseFloat(document.getElementById('m2').value);
        if(m <= 0 || isNaN(m)) return alert("Ingresa metros válidos.");
        
        carrito.push({ desc: `${actual.FORMATO} | ${actual.TEXTURA} | ${actual.COLOR}`, m2: m, sub: actual.PRECIO_USD * m });
        document.getElementById('cart_sec').style.display = 'block';
        update();
    }

    function update() {
        let l = document.getElementById('lista'), t = 0;
        l.innerHTML = '';
        carrito.forEach((i, idx) => { 
            t += i.sub; 
            l.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <div><b>${i.desc}</b><br><small>${i.m2} m²</small></div>
                <div>$${i.sub.toFixed(2)}</div>
            </div>`; 
        });
        document.getElementById('g_total').innerText = t.toFixed(2);
    }

    function enviar() {
        let n = document.getElementById('c_nombre').value, r = document.getElementById('c_rif').value;
        if(!n || !r) return alert("Por favor completa Nombre y RIF del cliente.");
        
        document.getElementById('loader').style.display = 'flex';
        
        let p = { 
            cliente: n, 
            rif: r, 
            telefono: document.getElementById('c_tlf').value, 
            ubicacion: document.getElementById('c_ubi').value, 
            total: document.getElementById('g_total').innerText 
        };
        
        fetch(API_URL + "?action=nuevo_pedido", { method: "POST", body: JSON.stringify(p) })
        .then(() => {
            alert("¡Orden enviada a Planta con éxito!"); 
            location.href = 'index.html'; // Devuelve al menú principal
        }).catch(e => {
            alert("Error al enviar. Intenta de nuevo.");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
