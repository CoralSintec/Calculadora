<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Cotizador Interno | Coralsintec</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #1c1c1c; --card-bg: #2d2d2d; --input-bg: #3a3a3a; --border: #555555; --text-main: #e0e0e0; --text-muted: #9ca3af; --green: #10b981; --blue: #3b82f6; --accent: #b0b0b0;}
        body { font-family: -apple-system, sans-serif; background-image: linear-gradient(rgba(28,28,28,0.95), rgba(28,28,28,0.95)), url('cabecera.jpg'); background-size: cover; background-attachment: fixed; margin: 0; padding: 15px; color: var(--text-main);}
        .app-main { width: 100%; max-width: 420px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 5px;}
        .btn-volver { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--text-main); font-size: 11px;}
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .user-badge { background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; text-align: center;}
        .user-eduardo { background: #3a3a3a; color: #ffffff; border-color: #b0b0b0; }
        .header { text-align: center; margin-bottom: 20px; padding-top: 10px;}
        .header h2 { margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase; color: #fff;}
        .header p { margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted); }
        .section-title { font-size: 13px; font-weight: 900; color: #fff; margin: 0 0 15px 0; display: flex; align-items: center; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 8px;}
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #404040; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select, input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--input-bg); color: #fff; border-radius: 8px; font-size: 13px; font-weight: bold; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; background: transparent; padding: 10px 0; border-bottom: 1px solid #404040; cursor: pointer;}
        .price-badge { background: #374151; color: #d1d5db; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; transition: 0.3s;}
        .price-badge.active { background: #1e3a8a; color: #93c5fd; }
        .btn-edit-price { display: inline-block; background: #4b5563; border: 1px solid #6b7280; color: #fff; border-radius: 6px; cursor: pointer; padding: 4px 8px; font-size: 12px; margin-left: 6px;}
        .strikethrough { text-decoration: line-through; color: #ef4444; font-size: 0.85em; margin-right: 6px; }
        .discount-badge { background: #f59e0b; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-left: 5px;}
        .btn-add { background: transparent; color: #fff; border: 1px solid #555; padding: 14px; width: 100%; border-radius: 8px; font-weight: 900; font-size: 13px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .cart-item { background: var(--input-bg); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid var(--blue); position: relative;}
        .cart-item-title { font-weight: 900; font-size: 14px; color: #fff; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #555; padding-bottom: 5px; width: 85%;}
        .cart-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 4px; color: #ccc;}
        .cart-item-price { font-weight: 900; color: #10b981; font-size: 16px; text-align: right; margin-top: 10px;}
        .btn-del { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer;}
        .total-box { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border);}
        .total-box b { font-size: 24px; color: #fff; }
        .btn-send { background: var(--blue); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28,28,28,0.95); display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent); z-index: 1000; font-size: 18px; flex-direction: column;}
    </style>
</head>
<body>
    <div id="loader"><span>⏳ Sincronizando 2,112 variantes...</span></div>
    <main class="app-main">
        <div class="top-bar">
            <button class="btn-volver" onclick="window.location.href='index.html'">⬅ MENÚ</button>
            <button class="btn-logout" onclick="localStorage.clear(); window.location.href='index.html';">🚪 SALIR</button>
            <div id="badge-usuario" class="user-badge user-eduardo">👑 GERENTE</div>
        </div>
        <div class="header"><h2>CORALSINTEC</h2><p>Cotizador Privado (Interno)</p></div>

        <div class="section-title">1. CONFIGURAR MATERIAL</div>
        <div class="form-card">
            <div class="form-group">
                <label>Formato / Modelo</label>
                <select id="sel-formato" onchange="filtrarUsos()"><option value="">Cargando...</option></select>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Uso</label><select id="sel-uso" onchange="filtrarTexturas()"><option value="">-</option></select></div>
                <div class="form-group"><label>Textura</label><select id="sel-textura" onchange="filtrarColores()"><option value="">-</option></select></div>
            </div>
            <div class="form-group"><label>Color</label><select id="sel-color" onchange="actualizarPrecioUI()"><option value="">-</option></select></div>
            <div class="form-group" style="background:#1c1c1c; padding:12px; border-radius:8px; border:1px solid #404040; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:11px; font-weight:800; color:#9ca3af; text-transform:uppercase;">Precio:</span>
                <div style="display:flex; align-items:center;">
                    <span id="precio-unitario-ui" style="font-size:18px; font-weight:900; color:#10b981;">$0.00</span>
                    <button class="btn-edit-price" onclick="editarPrecioBase()">✏️</button>
                </div>
            </div>
            <div class="form-group">
                <label id="lbl-cantidad">Cantidad (m²):</label>
                <input type="number" id="inp-cantidad" placeholder="Ej: 50" min="1" step="0.1">
            </div>
            <div>
                <div class="checkbox-group">
                    <input type="checkbox" id="chk-carateo">
                    <label for="chk-carateo">Carateo (Sacos)</label>
                    <span class="price-badge" id="badge-carateo">Automático</span>
                    <button class="btn-edit-price" onclick="editarPrecioCarateo()">✏️</button>
                </div>
            </div>
            <button class="btn-add" onclick="agregarAlCarrito()">AGREGAR A LA LISTA</button>
        </div>

        <div class="section-title">2. LISTA DE COMPRA</div>
        <div class="form-card">
            <div id="carrito-container"><p style="text-align:center; color:var(--text-muted); font-size:12px;">Vacío.</p></div>
            <div class="total-box"><span>Total USD</span><br><b id="gran-total">$0.00</b></div>
        </div>

        <div class="section-title">3. DATOS CLIENTE</div>
        <div class="form-card">
            <input type="text" id="cli-nombre" placeholder="NOMBRE CLIENTE" style="margin-bottom:10px;">
            <input type="text" id="cli-telefono" placeholder="WHATSAPP" style="margin-bottom:10px;">
            <button class="btn-send" onclick="enviarCotizacion()">ENVIAR A PLANTA</button>
        </div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQS2jTGOpkjdFZM116nP9MLIoOgMNKB9Yl48duVoOUUrdmliZF9ji_rdsX7nK8dN5rvjxQx0H-OF7k7/pub?gid=0&single=true&output=csv";
    
    let dbProductos = [];
    let carrito = [];
    let overridePrecioBase = null;
    let overridePrecioCarateo = null;

    window.onload = () => { cargarInventario(); };

    function cargarInventario() {
        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(results) {
                dbProductos = results.data.filter(row => row.FORMATO);
                iniciarFiltros();
                document.getElementById('loader').style.display = 'none';
            }
        });
    }

    function getUnique(arr, key) { return [...new Set(arr.map(item => item[key]))].filter(Boolean); }

    function iniciarFiltros() {
        let formatos = getUnique(dbProductos, 'FORMATO');
        let sel = document.getElementById('sel-formato');
        sel.innerHTML = '<option value="">-- Formato --</option>';
        formatos.forEach(f => sel.innerHTML += `<option value="${f}">${f}</option>`);
    }

    function filtrarUsos() {
        overridePrecioBase = null;
        let f = document.getElementById('sel-formato').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f);
        let usos = getUnique(filtrado, 'USO');
        let sel = document.getElementById('sel-uso');
        sel.innerHTML = '<option value="">-- Uso --</option>';
        usos.forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
        actualizarPrecioUI();
    }

    function filtrarTexturas() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f && x.USO === u);
        let texturas = getUnique(filtrado, 'TEXTURA');
        let sel = document.getElementById('sel-textura');
        sel.innerHTML = '<option value="">-- Textura --</option>';
        texturas.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
        actualizarPrecioUI();
    }

    function filtrarColores() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = document.getElementById('sel-textura').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f && x.USO === u && x.TEXTURA === t);
        let colores = getUnique(filtrado, 'COLOR');
        let sel = document.getElementById('sel-color');
        sel.innerHTML = '<option value="">-- Color --</option>';
        colores.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        actualizarPrecioUI();
    }

    function getProductoSeleccionado() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = document.getElementById('sel-textura').value;
        let c = document.getElementById('sel-color').value;
        return dbProductos.find(x => x.FORMATO === f && x.USO === u && x.TEXTURA === t && x.COLOR === c);
    }

    function calcularPrecioCarateo(color) {
        if(!color) return 0;
        let c = String(color).toLowerCase();
        let precioSaco = 55.00; 
        let costoColorante = 0;
        if(c.includes('beige')) return 60.00 * 1.15;
        if(c.includes('gris 1%')) costoColorante = 2.34; 
        else if(c.includes('gris 2%')) costoColorante = 4.68;
        else if(c.includes('gris 3%')) costoColorante = 7.02;
        else if(c.includes('black') || c.includes('negro')) costoColorante = 9.36;
        else if(!c.includes('gris claro')) {
            if(c.includes('1%')) costoColorante = 5.00;
            else if(c.includes('2%')) costoColorante = 10.00;
            else if(c.includes('3%')) costoColorante = 15.00;
            else costoColorante = 5.00;
        }
        return (precioSaco + costoColorante) * 1.15;
    }

    function actualizarPrecioUI() {
        let p = getProductoSeleccionado();
        let display = document.getElementById('precio-unitario-ui');
        let badgeCarateo = document.getElementById('badge-carateo');
        if(p && p.PRECIO_USD) {
            let pOrig = parseFloat(p.PRECIO_USD);
            display.innerHTML = overridePrecioBase ? `<span class="strikethrough">$${pOrig.toFixed(2)}</span> $${overridePrecioBase.toFixed(2)}` : `$${pOrig.toFixed(2)}`;
            let carOrig = calcularPrecioCarateo(p.COLOR);
            badgeCarateo.innerText = overridePrecioCarateo ? `$${overridePrecioCarateo.toFixed(2)} / Saco` : `$${carOrig.toFixed(2)} / Saco`;
            badgeCarateo.classList.add('active');
        } else {
            display.innerText = `$0.00`;
            badgeCarateo.innerText = `Automático`;
            badgeCarateo.classList.remove('active');
        }
    }

    function editarPrecioBase() {
        let p = getProductoSeleccionado();
        if(!p) return alert("Selecciona material.");
        let n = prompt("Nuevo precio:", parseFloat(p.PRECIO_USD).toFixed(2));
        if(n) { overridePrecioBase = parseFloat(n); actualizarPrecioUI(); }
    }

    function editarPrecioCarateo() {
        let p = getProductoSeleccionado();
        let c = prompt("Nuevo precio carateo:", calcularPrecioCarateo(p?.COLOR).toFixed(2));
        if(c) { overridePrecioCarateo = parseFloat(c); actualizarPrecioUI(); }
    }

    function agregarAlCarrito() {
        let prod = getProductoSeleccionado();
        let cant = parseFloat(document.getElementById('inp-cantidad').value);
        if(!prod || !cant) return alert("Faltan datos.");
        let pBase = overridePrecioBase || parseFloat(prod.PRECIO_USD);
        let pCar = overridePrecioCarateo || calcularPrecioCarateo(prod.COLOR);
        let areaReal = cant; // Simplificado para este ejemplo
        let item = {
            id: Date.now(), formato: prod.FORMATO, color: prod.COLOR, textura: prod.TEXTURA,
            m2: cant, m2Precio: pBase, carateoCant: document.getElementById('chk-carateo').checked ? Math.ceil(areaReal/40) : 0,
            carateoPrecio: pCar, total: (cant * pBase) + (document.getElementById('chk-carateo').checked ? Math.ceil(areaReal/40)*pCar : 0)
        };
        carrito.push(item);
        renderCarrito();
    }

    function renderCarrito() {
        let cont = document.getElementById('carrito-container');
        let total = 0; cont.innerHTML = "";
        carrito.forEach(i => {
            total += i.total;
            cont.innerHTML += `<div class="cart-item">
                <button class="btn-del" onclick="carrito=carrito.filter(x=>x.id!=${i.id});renderCarrito();">X</button>
                <div class="cart-item-title">${i.m2} m² - ${i.formato}</div>
                <div class="cart-row"><b>${i.color} (${i.textura})</b></div>
                <div class="cart-item-price">$${i.total.toFixed(2)}</div>
            </div>`;
        });
        document.getElementById('gran-total').innerText = "$" + total.toFixed(2);
    }

    function enviarCotizacion() {
        if(!carrito.length) return alert("Carrito vacío.");
        document.getElementById('loader').style.display = 'flex';
        fetch(API_URL + "?action=guardar_solicitud", {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ cliente: document.getElementById('cli-nombre').value, telefono: document.getElementById('cli-telefono').value, total_usd: carrito.reduce((s,i)=>s+i.total,0), detalles_json: JSON.stringify(carrito) })
        }).finally(() => { location.reload(); });
    }
</script>
</body>
</html>
