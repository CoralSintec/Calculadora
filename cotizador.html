<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Cotizador | Coralsintec</title>
    <style>
        :root { --bg: #1c1c1c; --card-bg: #2d2d2d; --input-bg: #3a3a3a; --border: #555555; --text-main: #e0e0e0; --text-muted: #9ca3af; --green: #10b981; --blue: #3b82f6; --accent: #b0b0b0;}
        body { font-family: -apple-system, sans-serif; background-image: linear-gradient(rgba(28,28,28,0.95), rgba(28,28,28,0.95)), url('cabecera.jpg'); background-size: cover; background-attachment: fixed; margin: 0; padding: 15px; color: var(--text-main);}
        .app-main { width: 100%; max-width: 600px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-volver { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--text-main); }
        .user-badge { background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .user-eduardo { background: #3a3a3a; color: #ffffff; border-color: #b0b0b0; }
        
        .header { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header h2 { margin: 0; letter-spacing: 1px; text-transform: uppercase; font-size: 18px;}
        
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-top: 5px solid var(--accent); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        select, input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--input-bg); color: #fff; border-radius: 8px; font-size: 14px; font-weight: bold; box-sizing: border-box; }
        select:focus, input:focus { outline: none; border-color: var(--blue); }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; background: var(--input-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer;}
        .checkbox-group input { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer;}
        .checkbox-group label { margin: 0; font-size: 13px; font-weight: bold; color: #fff; cursor: pointer; flex: 1;}
        .price-badge { background: #1e3a8a; color: #93c5fd; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 900;}

        .btn-add { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .btn-add:active { transform: scale(0.98); }
        
        .cart-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .cart-item { background: var(--input-bg); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--blue); position: relative;}
        .cart-item-title { font-weight: 900; font-size: 14px; color: #fff; margin-bottom: 5px; }
        .cart-item-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 5px;}
        .cart-item-price { font-weight: 900; color: #10b981; font-size: 15px;}
        .btn-del { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; font-weight: bold; cursor: pointer;}
        
        .total-box { background: #1c1c1c; border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: right; margin-top: 15px; }
        .total-box span { font-size: 12px; color: var(--text-muted); font-weight: bold; display: block; text-transform: uppercase;}
        .total-box b { font-size: 24px; color: #fff; }

        .btn-send { background: var(--green); color: #1c1c1c; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: 0.2s; }
        .btn-send:active { transform: scale(0.98); }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28,28,28,0.95); display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent); z-index: 1000; font-size: 18px; flex-direction: column; gap:10px;}
    </style>
</head>
<body>
    <div id="loader"><span>⏳ Sincronizando Inventario...</span></div>
    
    <main class="app-main">
        <div class="top-bar">
            <button class="btn-volver" onclick="window.location.href='index.html'">⬅ MENÚ</button>
            <div id="badge-usuario" class="user-badge">👤 USUARIO</div>
        </div>
        
        <div class="header">
            <h2>🛒 Armar Cotización</h2>
            <p style="margin: 5px 0 0 0; font-size: 12px; color:var(--text-muted);">Selecciona los productos y agrégalos a la lista</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>Formato / Modelo</label>
                <select id="sel-formato" onchange="filtrarUsos()"><option value="">Cargando...</option></select>
            </div>
            <div class="form-group">
                <label>Aplicación (Uso)</label>
                <select id="sel-uso" onchange="filtrarEspesores()"><option value="">Seleccione Formato primero</option></select>
            </div>
            <div class="form-group">
                <label>Espesor</label>
                <select id="sel-espesor" onchange="filtrarTexturas()"><option value="">Seleccione Uso primero</option></select>
            </div>
            <div class="form-group">
                <label>Textura</label>
                <select id="sel-textura" onchange="filtrarColores()"><option value="">Seleccione Espesor primero</option></select>
            </div>
            <div class="form-group">
                <label>Color</label>
                <select id="sel-color" onchange="actualizarPrecioUI()"><option value="">Seleccione Textura primero</option></select>
            </div>
            
            <div class="form-group" style="background:#1c1c1c; padding:15px; border-radius:8px; border:1px dashed #555; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px; font-weight:800; color:#9ca3af; text-transform:uppercase;">Precio Base Unitario:</span>
                <span id="precio-unitario-ui" style="font-size:20px; font-weight:900; color:#10b981;">$0.00</span>
            </div>

            <div class="form-group">
                <label id="lbl-cantidad">Cantidad (m²):</label>
                <input type="number" id="inp-cantidad" placeholder="Ej: 50" min="1" step="0.1">
            </div>

            <div style="margin-top: 20px;">
                <label style="font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display:block;">Complementos (Opcional)</label>
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-carateo">
                    <span>Sellador de Juntas (Carateo)</span>
                    <span class="price-badge" id="badge-carateo">Automático</span>
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="chk-sellador">
                    <span>Sellador Hidrorepelente Galón</span>
                    <span class="price-badge">$100 / Gal</span>
                </label>
            </div>

            <button class="btn-add" onclick="agregarAlCarrito()">➕ AGREGAR A LA LISTA</button>
        </div>

        <div class="cart-card">
            <h3 style="margin: 0 0 15px 0; color: #fff; font-size: 16px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">📋 Lista de Materiales</h3>
            <div id="carrito-container">
                <p style="text-align:center; color:var(--text-muted); font-size:12px; font-weight:bold;">La lista está vacía.</p>
            </div>
            <div class="total-box">
                <span>Total Estimado</span>
                <b id="gran-total">$0.00</b>
            </div>
        </div>

        <div class="form-card">
            <h3 style="margin: 0 0 15px 0; color: #fff; font-size: 16px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">👤 Datos del Cliente</h3>
            <div class="form-group"><input type="text" id="cli-nombre" placeholder="Nombre y Apellido o Empresa" style="text-transform: uppercase;"></div>
            <div class="form-group"><input type="text" id="cli-rif" placeholder="C.I. / RIF (Ej: J-12345678-9)" style="text-transform: uppercase;"></div>
            <div class="form-group"><input type="text" id="cli-telefono" placeholder="Teléfono de Contacto"></div>
            <div class="form-group"><input type="text" id="cli-obra" placeholder="Ubicación de la Obra (Ciudad, Zona)" style="text-transform: uppercase;"></div>
            
            <button class="btn-send" onclick="enviarCotizacion()">🚀 ENVIAR A BANDEJA</button>
        </div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";
    let dbProductos = [];
    let carrito = [];

    const uActual = String(localStorage.getItem('usuarioCoralsintec') || '').trim().toUpperCase();
    const soyElJefe = (uActual === 'EDUARDO' || uActual.indexOf('EDUARDO') !== -1);

    window.onload = () => {
        document.getElementById('badge-usuario').innerText = "👤 " + (uActual || "ASESOR");
        if(soyElJefe) { document.getElementById('badge-usuario').innerText = "👑 MODO GERENTE"; document.getElementById('badge-usuario').classList.add('user-eduardo'); }
        cargarInventario();
    };

    function cargarInventario() {
        fetch(API_URL + "?action=get_productos")
        .then(r => r.json())
        .then(data => {
            dbProductos = data;
            iniciarFiltros();
            document.getElementById('loader').style.display = 'none';
        })
        .catch(e => {
            document.getElementById('loader').innerHTML = "<span>⚠️ Error de conexión.<br>Recarga la página.</span>";
        });
    }

    function getUnique(arr, key) { return [...new Set(arr.map(item => item[key]))].filter(Boolean); }

    function iniciarFiltros() {
        let formatos = getUnique(dbProductos, 'FORMATO');
        let sel = document.getElementById('sel-formato');
        sel.innerHTML = '<option value="">-- Seleccione Formato --</option>';
        formatos.forEach(f => sel.innerHTML += `<option value="${f}">${f}</option>`);
    }

    function filtrarUsos() {
        let f = document.getElementById('sel-formato').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f);
        let usos = getUnique(filtrado, 'USO');
        
        let sel = document.getElementById('sel-uso');
        sel.innerHTML = '<option value="">-- Seleccione Uso --</option>';
        usos.forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
        
        document.getElementById('sel-espesor').innerHTML = '<option value="">Seleccione Uso primero</option>';
        document.getElementById('sel-textura').innerHTML = '<option value="">Seleccione Espesor primero</option>';
        document.getElementById('sel-color').innerHTML = '<option value="">Seleccione Textura primero</option>';
        
        let lbl = document.getElementById('lbl-cantidad');
        let fLow = f.toLowerCase();
        if(fLow.includes('borde') || fLow.includes('gotero') || fLow.includes('rodapie') || fLow.includes('huella') || fLow.includes('escalon')) {
            lbl.innerText = "CANTIDAD (MTL / Unidades):";
        } else {
            lbl.innerText = "CANTIDAD (m²):";
        }
        actualizarPrecioUI();
    }

    function filtrarEspesores() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f && x.USO === u);
        let espesores = getUnique(filtrado, 'ESPESOR');
        
        let sel = document.getElementById('sel-espesor');
        sel.innerHTML = '<option value="">-- Seleccione Espesor --</option>';
        espesores.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
        actualizarPrecioUI();
    }

    function filtrarTexturas() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let e = document.getElementById('sel-espesor').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f && x.USO === u && x.ESPESOR === e);
        let texturas = getUnique(filtrado, 'TEXTURA');
        
        let sel = document.getElementById('sel-textura');
        sel.innerHTML = '<option value="">-- Seleccione Textura --</option>';
        texturas.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
        actualizarPrecioUI();
    }

    function filtrarColores() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let e = document.getElementById('sel-espesor').value;
        let t = document.getElementById('sel-textura').value;
        let filtrado = dbProductos.filter(x => x.FORMATO === f && x.USO === u && x.ESPESOR === e && x.TEXTURA === t);
        let colores = getUnique(filtrado, 'COLOR');
        
        let sel = document.getElementById('sel-color');
        sel.innerHTML = '<option value="">-- Seleccione Color --</option>';
        colores.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        actualizarPrecioUI();
    }

    function getProductoSeleccionado() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let e = document.getElementById('sel-espesor').value;
        let t = document.getElementById('sel-textura').value;
        let c = document.getElementById('sel-color').value;
        return dbProductos.find(x => x.FORMATO === f && x.USO === u && x.ESPESOR === e && x.TEXTURA === t && x.COLOR === c);
    }

    function actualizarPrecioUI() {
        let p = getProductoSeleccionado();
        let display = document.getElementById('precio-unitario-ui');
        let badgeCarateo = document.getElementById('badge-carateo');
        
        if(p && p.PRECIO_USD) {
            display.innerText = `$${parseFloat(p.PRECIO_USD).toFixed(2)}`;
            let colorLower = String(p.COLOR).toLowerCase();
            let precioSaco = (colorLower.includes('beige') || colorLower.includes('gris claro')) ? 60 : 50;
            badgeCarateo.innerText = `$${precioSaco} / Saco`;
        } else {
            display.innerText = `$0.00`;
            badgeCarateo.innerText = `Automático`;
        }
    }

    function agregarAlCarrito() {
        let prod = getProductoSeleccionado();
        let cantStr = document.getElementById('inp-cantidad').value;
        let cant = parseFloat(cantStr);
        
        if(!prod) { alert("Por favor selecciona todas las características del producto."); return; }
        if(isNaN(cant) || cant <= 0) { alert("Ingresa una cantidad válida."); return; }
        
        let precioBase = parseFloat(prod.PRECIO_USD);
        let fLow = String(prod.FORMATO).toLowerCase();
        let esLineal = (fLow.includes('borde') || fLow.includes('gotero') || fLow.includes('rodapie') || fLow.includes('huella') || fLow.includes('escalon'));
        
        // EXTRACCIÓN DE MEDIDAS BLINDADA CON REGEX 
        let ancho = 100;
        let largo = 100;
        let matchDim = prod.FORMATO.match(/(\d+(?:\.\d+)?)\s*x\s*(\d+(?:\.\d+)?)/i);
        
        if (matchDim) {
            ancho = parseFloat(matchDim[1]);
            largo = parseFloat(matchDim[2]);
        } else {
            // Medidas de seguridad si el formato no dice "30x100" sino solo "Borde de ventana"
            if (fLow.includes('ventana')) { ancho = 30; largo = 100; }
            else if (fLow.includes('rodapie')) { ancho = 15; largo = 75; }
            else { ancho = 50; largo = 50; } 
        }

        let areaPuraUnaPieza = (ancho * largo) / 10000;
        let areaConModificadores = areaPuraUnaPieza;

        // Modificadores de volumen para el trompo
        if (fLow.includes('borde') && !fLow.includes('ventana')) areaConModificadores *= 1.15; // Labio L Piscina
        if (fLow.includes('escalon') || fLow.includes('gotero')) areaConModificadores *= 1.15; // Labio L
        if (String(prod.ESPESOR).includes('5.0')) areaConModificadores *= 2.27; // Doble grosor

        // Calculo de piezas a mostrar en el carrito
        let pcs = esLineal ? cant : Math.ceil(cant / areaPuraUnaPieza);
        
        // Calculo secreto de Metros Cuadrados reales para que la Fábrica no bote cemento
        // Si compran Lineales (10 bordes) -> envia: 10 * areaModificada
        // Si compran M2 (10 m2) -> envia: 10 * (areaModificada / areaPura) 
        let m2ParaFabrica = esLineal ? (cant * areaConModificadores) : (cant * (areaConModificadores / areaPuraUnaPieza));

        // Cálculo de Complementos (Área física real que se va a sellar/caratear)
        let areaFisicaReal = esLineal ? (cant * areaPuraUnaPieza) : cant;
        let quiereCarateo = document.getElementById('chk-carateo').checked;
        let quiereSellador = document.getElementById('chk-sellador').checked;
        
        let sacosCarateo = quiereCarateo ? Math.ceil(areaFisicaReal / 15) : 0; 
        let galonesSellador = quiereSellador ? Math.ceil(areaFisicaReal / 20) : 0;
        
        let colorLower = String(prod.COLOR).toLowerCase();
        let precioSacoCarateo = (colorLower.includes('beige') || colorLower.includes('gris claro')) ? 60 : 50;
        
        let totalRev = cant * precioBase;
        let totalCarateo = sacosCarateo * precioSacoCarateo;
        let totalSellador = galonesSellador * 100;
        let subtotal = totalRev + totalCarateo + totalSellador;

        let item = {
            id: Date.now(),
            formato: prod.FORMATO,
            uso: prod.USO,
            color: prod.COLOR,
            textura: prod.TEXTURA,
            espesor: prod.ESPESOR,
            m2: cant, // Lo que ve el cliente (MTL o Unidades)
            m2Final: cant, 
            m2Receta: parseFloat(m2ParaFabrica.toFixed(2)), // VOLUMEN EXACTO DE MEZCLA PARA LA PLANTA
            piezas: pcs,
            carateo: sacosCarateo,
            sellador: galonesSellador,
            total: subtotal
        };

        carrito.push(item);
        
        document.getElementById('inp-cantidad').value = "";
        document.getElementById('chk-carateo').checked = false;
        document.getElementById('chk-sellador').checked = false;
        renderCarrito();
    }

    function eliminarItem(id) {
        carrito = carrito.filter(x => x.id !== id);
        renderCarrito();
    }

    function renderCarrito() {
        let cont = document.getElementById('carrito-container');
        let granTotal = 0;
        cont.innerHTML = "";
        
        if(carrito.length === 0) {
            cont.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:12px; font-weight:bold;">La lista está vacía.</p>';
            document.getElementById('gran-total').innerText = "$0.00";
            return;
        }

        carrito.forEach(i => {
            granTotal += i.total;
            let extras = "";
            if(i.carateo > 0) extras += ` | +${i.carateo} sacos de carateo`;
            if(i.sellador > 0) extras += ` | +${i.sellador} gal. sellador`;
            
            let fLow = String(i.formato).toLowerCase();
            let esLineal = (fLow.includes('borde') || fLow.includes('gotero') || fLow.includes('rodapie') || fLow.includes('huella') || fLow.includes('escalon'));
            let unidadTexto = esLineal ? ' MTL/Und' : ' m²';

            cont.innerHTML += `
            <div class="cart-item">
                <button class="btn-del" onclick="eliminarItem(${i.id})">X</button>
                <div class="cart-item-title">${i.m2Final}${unidadTexto} - ${i.formato}</div>
                <div class="cart-item-desc">${i.color} (${i.textura}) - Uso: ${i.uso}</div>
                <div class="cart-item-desc" style="color:#b0b0b0;">${i.piezas} piezas aprox. ${extras}</div>
                <div class="cart-item-price">$${i.total.toFixed(2)}</div>
            </div>`;
        });
        
        document.getElementById('gran-total').innerText = "$" + granTotal.toFixed(2);
    }

    function enviarCotizacion() {
        if(carrito.length === 0) { alert("Agrega al menos un producto a la lista."); return; }
        
        let cli = document.getElementById('cli-nombre').value.trim().toUpperCase();
        let rif = document.getElementById('cli-rif').value.trim().toUpperCase();
        let tlf = document.getElementById('cli-telefono').value.trim();
        let obra = document.getElementById('cli-obra').value.trim().toUpperCase();
        
        if(cli === "") { alert("El nombre del cliente es obligatorio."); return; }
        
        let totalVenta = carrito.reduce((sum, i) => sum + i.total, 0);

        let payload = {
            cliente: cli,
            rif_ci: rif,
            telefono: tlf,
            ubicacion: obra,
            total_usd: totalVenta,
            detalles_json: JSON.stringify(carrito)
        };

        document.getElementById('loader').innerHTML = "<span>🚀 Enviando Solicitud...</span>";
        document.getElementById('loader').style.display = 'flex';

        fetch(API_URL + "?action=guardar_solicitud", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload)
        }).finally(() => {
            setTimeout(() => {
                alert("¡Cotización enviada a la bandeja exitosamente!");
                window.location.reload();
            }, 1500);
        });
    }
</script>
</body>
</html>
