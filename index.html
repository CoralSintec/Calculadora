<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coralsintec | Centro de Mando</title>
    <style>
        :root { --p: #1e2328; --a: #c49660; --bg: #d1d5db; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center; box-sizing: border-box; border-top: 8px solid var(--p); }
        .btn-main { background: var(--p); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .menu-card { background: #f8fafc; padding: 25px; border-radius: 15px; border-left: 6px solid var(--a); cursor: pointer; text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; text-align: center; margin-bottom: 10px; }
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen" class="screen active">
            <h1 style="color:var(--p);">CORALSINTEC</h1>
            <input type="text" id="username" placeholder="USUARIO" style="text-transform: uppercase;">
            <input type="password" id="pin" placeholder="PIN" maxlength="4">
            <button class="btn-main" onclick="validar()">ENTRAR</button>
        </div>

        <div id="dashboard-screen" class="screen">
            <h2 id="welcome">HOLA</h2>
            <div onclick="location.href='cotizador.html'" class="menu-card" id="v-btn"><h3>🛒 VENTAS</h3></div>
            <div onclick="location.href='planta.html'" class="menu-card" style="border-left-color: #f59e0b;"><h3>🏭 PLANTA</h3></div>
            <div onclick="location.href='gerencia.html'" class="menu-card" id="g-btn" style="border-left-color: #6366f1;"><h3>📊 GERENCIA</h3></div>
            <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const dbu = {"EDUARDO": "1234", "VENTAS": "1111", "PLANTA": "0000"};
        
        window.onload = () => {
            const s = localStorage.getItem('usuarioCoralsintec');
            if(s) ui(s);
        };

        function validar() {
            const u = document.getElementById('username').value.toUpperCase().trim();
            const p = document.getElementById('pin').value;
            if(dbu[u] && dbu[u] === p) {
                localStorage.setItem('usuarioCoralsintec', u);
                ui(u);
            } else { alert("Error"); }
        }

        function ui(u) {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('dashboard-screen').classList.add('active');
            document.getElementById('welcome').innerText = "HOLA " + u;
            if(u === "PLANTA") {
                document.getElementById('v-btn').style.display = 'none';
                document.getElementById('g-btn').style.display = 'none';
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
