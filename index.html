<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coralsintec App</title>
    <style>
        :root {
            --coralsintec-primary: #2a2d34;
            --coralsintec-accent: #c49660;
        }

        body, h1, h2, span, a, div, header, footer {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* FONDO */
        .app-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(135deg, #d1d5db 0%, #f3f4f6 100%);
            position: relative; overflow: hidden;
        }

        /* PATRÓN DE CONCRETO SUTIL */
        .app-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 0; pointer-events: none;
        }

        /* CABECERA (Usa cabecera.jpg) */
        .app-header {
            width: 100%; padding: 40px 20px 10px 20px;
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }
        
        .app-header img {
            width: 100%; max-width: 320px; height: auto;
            border-radius: 8px;
            mix-blend-mode: darken; 
        }

        /* LOGO CENTRAL SIN FONDO (Usa marca.png) */
        .main-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; max-width: 300px;
            z-index: 1; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-content img { 
            width: 100%; height: auto; 
            /* Se eliminaron bordes y sombras para que el PNG transparente luzca natural */
        }

        /* BOTONES INFERIORES */
        .app-footer {
            width: 100%; padding: 20px; padding-bottom: 40px;
            position: relative; z-index: 2;
        }

        .button-container { display: flex; justify-content: space-around; gap: 12px; }

        .app-button {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border: 1px solid #d1d5db; border-radius: 16px;
            padding: 15px 5px; text-decoration: none;
            box-shadow: 5px 5px 10px #c2c5c9, -5px -5px 10px #ffffff;
            transition: all 0.2s;
        }

        .app-button:active {
            box-shadow: inset 5px 5px 10px #c2c5c9, inset -5px -5px 10px #ffffff;
            transform: scale(0.98);
        }

        .app-button img { 
            width: 45px; height: 45px; margin-bottom: 10px; 
        }
        .app-button span { font-size: 10px; font-weight: 800; color: var(--coralsintec-primary); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="app-container">

        <header class="app-header">
            <img src="cabecera.jpg" alt="Coralsintec Header">
        </header>

        <div class="main-content">
            <img src="marca.png" alt="Coralsintec Logo Definitivo">
        </div>

        <footer class="app-footer">
            <div class="button-container">
                <a href="cotizador.html" class="app-button">
                    <img src="icono.png" alt="Calculadora">
                    <span>Calculadora</span>
                </a>
                
                <a href="catalogo.pdf" target="_blank" class="app-button">
                    <img src="icono.png" alt="Catálogo">
                    <span>Catálogo</span>
                </a>

                <a href="https://wa.me/tunumerodecelular" target="_blank" class="app-button">
                    <img src="icono.png" alt="Contacto">
                    <span>Contacto</span>
                </a>
            </div>
        </footer>

    </div>

</body>
</html>
