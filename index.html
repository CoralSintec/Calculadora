<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coralsintec App</title>
    <style>
        :root {
            --coralsintec-primary: #2a2d34;
            --coralsintec-accent: #c49660;
        }

        body, h1, h2, span, a, div, header, footer {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* FONDO LISO TIPO ESTUDIO (Igual al de la foto original) */
        .app-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            /* Este código imita el fondo gris claro con luz al centro de tu foto original */
            background: radial-gradient(circle at center, #e8e8e8 0%, #cfcfcf 100%);
            position: relative; overflow: hidden;
        }

        /* CABECERA */
        .app-header {
            width: 100%; padding: 40px 20px 10px 20px;
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }
        
        .app-header img {
            width: 100%; max-width: 320px; height: auto;
            border-radius: 8px;
            mix-blend-mode: darken; 
        }

        /* LOGO CENTRAL SIN FONDO */
        .main-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; max-width: 300px;
            z-index: 1; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-content img { 
            width: 100%; height: auto; 
        }

        /* BOTONES INFERIORES */
        .app-footer {
            width: 100%; padding: 20px; padding-bottom: 40px;
            position: relative; z-index: 2;
        }

        .button-container { display: flex; justify-content: space-around; gap: 12px; }

        .app-button {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* Botones que combinan con el nuevo fondo */
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            border: 1px solid #bcbcbc; border-radius: 16px;
            padding: 15px 5px; text-decoration: none;
            box-shadow: 5px 5px 10px #b0b0b0, -5px -5px 10px #ffffff;
            transition: all 0.2s;
        }

        .app-button:active {
            box-shadow: inset 5px 5px 10px #b0b0b0, inset -5px -5px 10px #ffffff;
            transform: scale(0.98);
        }

        .app-button img { 
            width: 45px; height: 45px; margin-bottom: 10px; 
        }
        .app-button span { font-size: 10px; font-weight: 800; color: var(--coralsintec-primary); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="app-container">

        <header class="app-header">
            <img src="cabecera.jpg" alt="Coralsintec Header">
        </header>

        <div class="main-content">
            <img src="marca.png" alt="Coralsintec Logo Definitivo">
        </div>

        <footer class="app-footer">
            <div class="button-container">
                <a href="cotizador.html" class="app-button">
                    <img src="icono.png" alt="Calculadora">
                    <span>Calculadora</span>
                </a>
                
                <a href="catalogo.pdf" target="_blank" class="app-button">
                    <img src="icono.png" alt="Catálogo">
                    <span>Catálogo</span>
                </a>

                <a href="https://wa.me/tunumerodecelular" target="_blank" class="app-button">
                    <img src="icono.png" alt="Contacto">
                    <span>Contacto</span>
                </a>
            </div>
        </footer>

    </div>

</body>
</html>
