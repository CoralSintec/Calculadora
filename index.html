<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coralsintec | Centro de Mando</title>
    <style>
        :root {
            --bg-color: #d1d5db; 
            --primary: #1f2937;
            --accent: #3b82f6;
            --text-light: #f3f4f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            background: white;
            border-radius: 12px;
            margin-top: 5vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* --- LOGIN --- */
        #login-screen { display: block; max-width: 350px; text-align: center; }
        .logo-placeholder { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 20px; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 15px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px;}
        .btn-success { background-color: var(--success); }
        .btn-back { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 10px; margin-bottom: 15px;}

        /* --- DASHBOARD --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #9ca3af; padding-bottom: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { padding: 30px 10px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; cursor: pointer; border: 2px solid transparent; background: var(--text-light); }
        .btn-ventas { border-left: 5px solid var(--accent); }
        .btn-planta { border-left: 5px solid var(--warning); }
        .btn-gerencia { border-left: 5px solid var(--primary); grid-column: span 2;}

        /* --- COTIZADOR --- */
        .cart-item { background: #f9fafb; border-left: 4px solid var(--accent); padding: 10px; margin-bottom: 10px; border-radius: 6px; }
        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; text-align: center; padding-top: 40vh; font-size: 20px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="loader-overlay">Sincronizando con el Cerebro...</div>

    <div id="login-screen" class="screen">
        <div class="logo-placeholder">CORALSINTEC</div>
        <div class="input-group">
            <label>USUARIO</label>
            <input type="text" id="username" placeholder="Ej: EDUARDO" style="text-transform: uppercase;">
        </div>
        <div class="input-group">
            <label>PIN DE ACCESO</label>
            <input type="password" id="pin" placeholder="****" maxlength="4">
        </div>
        <button class="btn" onclick="iniciarSesion()">ENTRAR</button>
        <p id="login-error" style="color: var(--danger); font-size: 14px; display: none;">Datos incorrectos</p>
    </div>

    <div id="dashboard-screen" class="screen">
        <div class="header">
            <div><h2 style="margin:0; color: var(--primary);">Panel de Control</h2></div>
            <button onclick="cambiarPantalla('login-screen')" style="background:none;border:none;color:var(--danger);font-weight:bold;cursor:pointer;">Salir</button>
        </div>
        <div class="menu-grid">
            <div class="menu-btn btn-ventas" onclick="abrirVentas()">🛒 Cotizador (Ventas)</div>
            <div class="menu-btn btn-planta" onclick="alert('Módulo de Planta en Fase 3')">🏭 Cola de Planta</div>
            <div class="menu-btn btn-gerencia" onclick="alert('Inventario y Costos en Fase 3')">📊 Gerencia e Inventario</div>
        </div>
    </div>

    <div id="ventas-screen" class="screen">
        <button class="btn btn-back" onclick="cambiarPantalla('dashboard-screen')">⬅ Volver al Menú</button>
        <h2 style="color: var(--primary); margin-top: 0;">Nueva Cotización</h2>
        
        <div class="input-group">
            <label>Cliente / Proyecto:</label>
            <input type="text" id="nombre-cliente" placeholder="Ej: Roderick Romer">
        </div>

        <div class="input-group">
            <label>Seleccionar Producto:</label>
            <select id="select-producto">
                <option value="">Cargando catálogo...</option>
            </select>
        </div>

        <div class="input-group">
            <label>Metros Cuadrados (m²):</label>
            <input type="number" id="input-m2" placeholder="0">
        </div>

        <button class="btn" onclick="agregarAlCarrito()">➕ Añadir a la Orden</button>

        <div id="lista-carrito" style="margin-top: 20px;"></div>
        <h3 style="text-align: right; color: var(--primary);">Total: $<span id="gran-total">0.00</span></h3>
        
        <button class="btn btn-success" onclick="enviarAPlanta()" id="btn-enviar" style="display:none;">📤 APROBAR Y ENVIAR A PLANTA</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwvASdGE2oeUtvxbAndOzbWEIOpJp5kHVdnxMLJJ6gpAyI4D9v_afU6HBXIwFd8A2V75Q/exec";
        
        const usuarios = { "EDUARDO": "1234", "VENTAS": "1111", "PLANTA": "0000" };
        let catalogoProductos = [];
        let ordenActual = [];
        let totalOrden = 0;

        function cambiarPantalla(idPantalla) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(idPantalla).style.display = 'block';
        }

        function mostrarLoader(mostrar) {
            document.getElementById('loader-overlay').style.display = mostrar ? 'block' : 'none';
        }

        function iniciarSesion() {
            let user = document.getElementById('username').value.toUpperCase();
            let pin = document.getElementById('pin').value;
            if(usuarios[user] && usuarios[user] === pin) {
                document.getElementById('login-error').style.display = 'none';
                cambiarPantalla('dashboard-screen');
                cargarCatalogo(); // Descarga los precios al entrar
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // 1. EL CEREBRO DESCARGA EL CATÁLOGO DE GOOGLE SHEETS
        function cargarCatalogo() {
            mostrarLoader(true);
            fetch(API_URL + "?action=get_productos")
            .then(res => res.json())
            .then(data => {
                catalogoProductos = data;
                let select = document.getElementById('select-producto');
                select.innerHTML = '<option value="">Seleccione un producto...</option>';
                data.forEach((prod, index) => {
                    select.innerHTML += `<option value="${index}">${prod.FORMATO} - ${prod.TEXTURA} - ${prod.COLOR} ($${prod.PRECIO_USD})</option>`;
                });
                mostrarLoader(false);
            })
            .catch(err => {
                mostrarLoader(false);
                alert("Error cargando productos. Revisa tu internet.");
            });
        }

        function abrirVentas() {
            cambiarPantalla('ventas-screen');
            ordenActual = [];
            actualizarCarrito();
        }

        // 2. LÓGICA DEL COTIZADOR
        function agregarAlCarrito() {
            let select = document.getElementById('select-producto');
            let m2 = parseFloat(document.getElementById('input-m2').value);
            let cliente = document.getElementById('nombre-cliente').value;
            
            if(!cliente) return alert("Por favor ingresa el nombre del cliente.");
            if(select.value === "" || isNaN(m2) || m2 <= 0) return alert("Selecciona un producto y los m² válidos.");

            let prod = catalogoProductos[select.value];
            let subtotal = prod.PRECIO_USD * m2;
            
            ordenActual.push({
                nombre: `${prod.FORMATO} ${prod.TEXTURA} ${prod.COLOR}`,
                m2: m2,
                subtotal: subtotal
            });

            document.getElementById('input-m2').value = '';
            actualizarCarrito();
        }

        function actualizarCarrito() {
            let div = document.getElementById('lista-carrito');
            div.innerHTML = '';
            totalOrden = 0;

            ordenActual.forEach((item) => {
                totalOrden += item.subtotal;
                div.innerHTML += `
                    <div class="cart-item">
                        <b>${item.nombre}</b><br>
                        ${item.m2} m² | Subtotal: $${item.subtotal.toFixed(2)}
                    </div>`;
            });

            document.getElementById('gran-total').innerText = totalOrden.toFixed(2);
            document.getElementById('btn-enviar').style.display = ordenActual.length > 0 ? 'block' : 'none';
        }

        // 3. ENVÍO DE LA ORDEN AL EXCEL DE PLANTA
        function enviarAPlanta() {
            let cliente = document.getElementById('nombre-cliente').value;
            let payload = {
                cliente: cliente,
                total: totalOrden,
                detalles: ordenActual
            };

            mostrarLoader(true);
            
            fetch(API_URL + "?action=nuevo_pedido", {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                mostrarLoader(false);
                alert("¡ÉXITO! La orden de " + cliente + " fue enviada a la Cola de Planta y el calendario de 25 días hábiles se ha activado.");
                abrirVentas(); // Reinicia la pantalla
                document.getElementById('nombre-cliente').value = '';
            })
            .catch(err => {
                mostrarLoader(false);
                alert("Hubo un error enviando la orden.");
            });
        }
    </script>
</body>
</html>
