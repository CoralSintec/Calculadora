<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coralsintec | Acceso</title>
    <style>
        body { font-family: sans-serif; background: #d1d5db; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .btn { background: #1e2328; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .menu { display: none; }
        .menu-btn { background: white; padding: 25px; margin: 10px 0; border-radius: 10px; font-weight: bold; border-left: 6px solid #c49660; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="card" id="login">
        <h2>CORALSINTEC</h2>
        <input type="text" id="user" placeholder="USUARIO" style="text-transform: uppercase;">
        <input type="password" id="pin" placeholder="PIN" maxlength="4">
        <button class="btn" onclick="entrar()">ENTRAR</button>
    </div>

    <div class="card menu" id="menu">
        <h3>Menú Principal</h3>
        <div class="menu-btn" onclick="location.href='cotizador.html'">🛒 VENTAS</div>
        <div class="menu-btn" style="border-left-color: #f59e0b;" onclick="alert('Fase Planta próximamente')">🏭 PLANTA</div>
        <button class="btn" style="background:#ef4444; margin-top:15px;" onclick="location.reload()">SALIR</button>
    </div>

    <script>
        const users = { "EDUARDO": "1234", "VENTAS": "1111" };
        function entrar() {
            let u = document.getElementById('user').value.toUpperCase();
            let p = document.getElementById('pin').value;
            if(users[u] === p) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('menu').style.display = 'block';
            } else { alert("PIN incorrecto"); }
        }
    </script>
</body>
</html>
