<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Producción Coralsintec</title>
    <style>
        :root { --coralsintec-primary: #1e2328; --coralsintec-border: #cbd5e1; --accent: #f59e0b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; }
        .app-main { width: 100%; max-width: 600px; display: flex; flex-direction: column; }
        .btn-volver { background: none; border: 1px solid var(--coralsintec-border); color: var(--coralsintec-primary); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 15px; align-self: flex-start; transition: 0.2s; }
        .btn-volver:active { background: #e2e8f0; transform: translateX(-3px); }
        .header { background: var(--coralsintec-primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }
        .client-info { font-size: 14px; margin-bottom: 15px; color: #475569; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: #f8fafc; color: var(--coralsintec-primary); text-align: left; padding: 8px; border-bottom: 2px solid #e2e8f0; font-size: 11px;}
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-weight: 600; }
        .qty-badge { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 4px; font-weight: 800; display: inline-block;}
        .pcs-badge { color: #166534; font-weight: 900; font-size: 15px;}
        
        /* ESTILO PARA LA CAJA DE MATERIALES EXTRA */
        .extras-box { background: #fffbeb; padding: 15px; border-radius: 8px; margin-top: 15px; border: 2px dashed #fcd34d; }
        .extras-title { margin: 0 0 10px 0; color: #92400e; border-bottom: 1px solid #fde68a; padding-bottom: 5px; font-size: 12px; text-transform: uppercase;}
        
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f3f4f6; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: var(--coralsintec-primary); font-size: 18px;}
    </style>
</head>
<body>
    <div id="loader-overlay"><span style="font-size: 30px; margin-bottom:10px;">⏳</span>Sincronizando Órdenes...</div>
    <main class="app-main">
        <button class="btn-volver" onclick="window.location.href='index.html'">⬅ VOLVER AL MENÚ</button>
        <div class="header">
            <h2 style="margin:0; letter-spacing: 1px;">HOJAS DE RUTA</h2>
            <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Departamento de Producción</p>
        </div>
        <div id="lista-pedidos"></div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzEy7UwhlGAOfl-X0vBuI05-qJYJ6KKPcdDwqgSckQ2bvEpxj4dLKYthqpeH5Tvv6mSng/exec";

    window.onload = () => {
        fetch(API_URL + "?action=get_pedidos&t=" + new Date().getTime())
        .then(r => r.json())
        .then(data => { document.getElementById('loader-overlay').style.display = 'none'; renderPedidos(data); })
        .catch(e => { alert("Error de conexión. Recargue la página."); document.getElementById('loader-overlay').style.display = 'none'; });
    };

    function calcularPiezas(formato, metros) {
        if (!formato || !metros || metros <= 0) return 0;
        try { let dim = formato.toLowerCase().split('x'); let areaPieza = (parseFloat(dim[0]) * parseFloat(dim[1])) / 10000; return Math.ceil(metros / areaPieza); } 
        catch(e) { return "N/D"; }
    }

    function renderPedidos(pedidos) {
        const container = document.getElementById('lista-pedidos');
        if(pedidos.length === 0) { container.innerHTML = "<p style='text-align:center; color:#64748b;'>No hay órdenes pendientes en Planta.</p>"; return; }

        pedidos.reverse().forEach(p => {
            if(!p.DETALLES_JSON) return; 
            let items = [];
            try { items = JSON.parse(p.DETALLES_JSON); } catch(e) { return; }
            
            // VARIABLES PARA SUMAR LOS MATERIALES
            let totalSacosCarateo = 0;
            let totalGalonesSellador = 0;

            let html = `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div class="client-info">
                            <b style="font-size:18px; color:var(--coralsintec-primary); text-transform:uppercase;">${p.CLIENTE}</b><br>
                            <span style="color:#64748b; font-size:12px;"><b>RIF:</b> ${p.RIF_CI}</span><br>
                            <span style="color:#64748b; font-size:12px;"><b>OBRA:</b> ${p.UBICACION}</span>
                        </div>
                        <div style="text-align:right; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-size:10px; font-weight:bold; color:#64748b;">ENTREGA ESTIMADA:</span><br>
                            <b style="color:#0f172a; font-size: 15px;">${p.FECHA_LIMITE_HABIL}</b>
                        </div>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead><tr><th>FORMATO</th><th>USO</th><th>COLOR</th><th>TEXTURA</th><th>ÁREA</th><th>FABRICAR</th></tr></thead>
                            <tbody>`;
            
            items.forEach(i => {
                if(!i.formato) return; 
                let metros = parseFloat(i.m2) || parseFloat(i.m) || 0; 
                let piezas = calcularPiezas(i.formato, metros);
                
                // AQUÍ SUMAMOS LO QUE EL COTIZADOR NOS ENVIÓ
                totalSacosCarateo += i.carateo || 0;
                totalGalonesSellador += i.sellador || 0;
                
                html += `
                    <tr>
                        <td>${i.formato}</td>
                        <td>${i.uso}</td>
                        <td>${i.color}</td>
                        <td>${i.textura}</td>
                        <td><span class="qty-badge">${metros} m²</span></td>
                        <td><span class="pcs-badge">${piezas} pcs</span></td>
                    </tr>`;
            });

            html += `</tbody></table></div>`;

            // CAJA DE MATERIALES EXTRA (SOLO SE MUESTRA SI HAY ALGO QUE ENVIAR)
            if(totalSacosCarateo > 0 || totalGalonesSellador > 0) {
                html += `<div class="extras-box">
                            <h4 class="extras-title">📦 Materiales de Instalación</h4>`;
                
                if(totalSacosCarateo > 0) {
                    html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-size:13px; font-weight:bold; color:#92400e;">SELLADOR DE JUNTAS (CARATEO):</span> 
                                <b style="font-size:16px; color:#b45309;">${totalSacosCarateo} SACOS</b>
                             </div>`;
                }
                if(totalGalonesSellador > 0) {
                    html += `<div style="display: flex; justify-content: space-between;">
                                <span style="font-size:13px; font-weight:bold; color:#92400e;">SELLADOR HIDROREPELENTE:</span> 
                                <b style="font-size:16px; color:#b45309;">${totalGalonesSellador} GALONES</b>
                             </div>`;
                }
                html += `</div>`;
            }

            html += `</div>`; // Cierra la tarjeta del pedido
            container.innerHTML += html;
        });
    }
</script>
</body>
</html>
