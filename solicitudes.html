<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes Recibidas | Coralsintec</title>
    <style>
        :root { 
            --bg: #1c1c1c; 
            --card-bg: #2d2d2d; 
            --border: #555555; 
            --text-main: #e0e0e0; 
            --text-muted: #9ca3af; 
            --green: #10b981; 
            --blue: #3b82f6; 
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background-image: linear-gradient(rgba(28,28,28,0.95), rgba(28,28,28,0.95)), url('cabecera.jpg');
            background-size: cover;
            background-attachment: fixed;
            margin: 0; 
            padding: 15px; 
            color: var(--text-main);
        }
        .app-main { width: 100%; max-width: 600px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-volver { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--text-main); }
        .header { background: #1a2e1a; color: #4ade80; border: 1px solid #166534; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; letter-spacing: 1px; text-transform: uppercase; font-size: 18px;}
        .solicitud-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-left: 5px solid var(--green); }
        .cliente-nombre { font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .info-txt { font-size: 12px; color: var(--text-muted); margin: 3px 0; }
        .info-txt b { color: #ccc; }
        .monto-box { background: rgba(22,101,52,0.2); padding: 10px; border-radius: 8px; border: 1px solid #166534; display: inline-block; margin-top: 10px; }
        .monto-box span { font-size: 10px; font-weight: bold; color: #4ade80; display: block; }
        .monto-box b { color: #86efac; font-size: 18px; }
        .items-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); }
        .item-row { background: #1c1c1c; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; border: 1px solid var(--border); color: #ddd;}
        .item-row b { color: #60a5fa; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-marcar { flex: 1; background: #166534; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .btn-marcar:active { transform: scale(0.98); }
        .btn-eliminar { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* Loader usando color cemento */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28,28,28,0.95); display: flex; justify-content: center; align-items: center; font-weight: bold; color: #b0b0b0; z-index: 100; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loader">⏳ Buscando solicitudes...</div>
    <main class="app-main">
        <div class="top-bar">
            <button class="btn-volver" onclick="location.href='index.html'">⬅ MENÚ</button>
            <div id="badge-usuario" style="background: #451a03; color: #fde047; border: 1px solid #854d0e; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800;"></div>
        </div>
        <div class="header"><h2>📥 Bandeja de Cotizaciones</h2><p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.9;">Enviadas por los clientes desde la web</p></div>
        <div id="lista-solicitudes"></div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";

    window.onload = () => {
        const u = localStorage.getItem('usuarioCoralsintec') || 'DESCONOCIDO';
        document.getElementById('badge-usuario').innerText = "👤 " + u;
        cargarSolicitudes();
    };

    function cargarSolicitudes() {
        document.getElementById('loader').style.display = 'flex';
        fetch(API_URL + "?action=get_solicitudes&t=" + Date.now()).then(r => r.json()).then(data => { render(data); document.getElementById('loader').style.display = 'none'; }).catch(e => { document.getElementById('loader').style.display = 'none'; });
    }

    function render(solicitudes) {
        const container = document.getElementById('lista-solicitudes'); container.innerHTML = '';
        if(!solicitudes || solicitudes.length === 0) { container.innerHTML = "<p style='text-align:center; color:#9ca3af; font-weight:bold; margin-top:40px;'>No hay cotizaciones nuevas por revisar.</p>"; return; }

        const usuarioActual = localStorage.getItem('usuarioCoralsintec') || 'DESCONOCIDO';
        let p_master = (usuarioActual === 'EDUARDO');
        let perms = {}; try { perms = JSON.parse(localStorage.getItem('permisosCoralsintec')) || {}; } catch(e){}
        const canApprove = p_master || perms.s_aprobar === true;

        solicitudes.reverse().forEach(s => {
            let items = []; try { items = JSON.parse(s.DETALLES_JSON); } catch(e){}
            let htmlItems = '';
            items.forEach(i => { let m2Final = i.m2Final || i.m2; htmlItems += `<div class="item-row"><b>${m2Final} m² de ${i.formato || 'Material'}</b> - ${i.color || ''} (${i.textura || ''})</div>`; });

            let totalVal = parseFloat(s.TOTAL_USD || s.TOTAL || 0).toFixed(2);
            let cardHtml = `<div class="solicitud-card"><div style="font-size: 10px; color: #9ca3af; margin-bottom: 5px; font-weight:bold;">FECHA: ${s.FECHA}</div><div class="cliente-nombre">${s.CLIENTE}</div><p class="info-txt"><b>RIF:</b> ${s.RIF || s.RIF_CI || '-'}</p><p class="info-txt"><b>Tlf:</b> ${s.TELEFONO}</p><p class="info-txt"><b>Obra:</b> ${s.UBICACION}</p><div class="monto-box"><span>VALOR COTIZADO:</span><b>$${totalVal}</b></div><div class="items-box"><p style="font-size:11px; font-weight:bold; color:#fff; margin: 0 0 10px 0;">MATERIAL SOLICITADO:</p>${htmlItems}</div>`;

            if(canApprove) {
                cardHtml += `<div class="btn-group"><button class="btn-marcar" onclick="aprobarAPlanta('${s.CLIENTE}', '${s.FECHA}')">✅ PAGADO / ENVIAR A PLANTA</button><button class="btn-eliminar" onclick="eliminar('${s.CLIENTE}', '${s.FECHA}')">🗑️</button></div>`;
            }
            cardHtml += `</div>`; container.innerHTML += cardHtml;
        });
    }

    function aprobarAPlanta(cliente, fecha) { if(!confirm("¿Confirmas el pago? El pedido será enviado a Planta.")) return; document.getElementById('loader').style.display = 'flex'; fetch(API_URL + "?action=marcar_pagado_solicitud", { method: "POST", mode: "no-cors", body: JSON.stringify({ cliente: cliente, fecha: fecha }) }).finally(() => { setTimeout(() => { cargarSolicitudes(); }, 1500); }); }
    function eliminar(cliente, fecha) { if(!confirm("¿Eliminar esta solicitud descartada?")) return; document.getElementById('loader').style.display = 'flex'; fetch(API_URL + "?action=eliminar_solicitud", { method: "POST", mode: "no-cors", body: JSON.stringify({ cliente: cliente, fecha: fecha }) }).finally(() => { setTimeout(() => { cargarSolicitudes(); }, 1500); }); }
</script>
</body>
</html>
