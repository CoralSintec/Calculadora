<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Presupuesto | Coralsintec</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; margin-top: 10px; background: #ecf0f1; padding: 10px; border-radius: 6px;}
        .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.2); cursor: pointer;}
        .resumen { background: #ecf0f1; padding: 15px; border-left: 4px solid var(--accent); border-radius: 6px; margin-top: 20px; }
        .total-box { font-size: 1.5em; font-weight: bold; color: var(--accent); text-align: right; margin-top: 10px; }
        .item-resumen { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em;}
        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 20px; transition: background 0.3s;}
        .btn-submit:hover { background: #d35400; }
        #mensajeExito { display: none; background: #2ecc71; color: white; padding: 15px; text-align: center; border-radius: 6px; margin-top: 20px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h2>Cotizador Coralsintec</h2>
    
    <form id="cotizadorForm">
        <div class="form-group">
            <label>Nombre y Apellido</label>
            <input type="text" id="clienteNombre" required placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label>Teléfono (WhatsApp)</label>
            <input type="tel" id="clienteTelefono" required placeholder="Ej. 04141234567">
        </div>

        <div class="form-group">
            <label>Formato</label>
            <select id="formato" onchange="filtrarTexturas()"><option value="">Cargando formatos...</option></select>
        </div>
        <div class="form-group">
            <label>Textura</label>
            <select id="textura" onchange="filtrarColores()" disabled><option value="">Seleccione un Formato primero</option></select>
        </div>
        <div class="form-group">
            <label>Color</label>
            <select id="color" onchange="calcularPresupuesto()" disabled><option value="">Seleccione una Textura primero</option></select>
        </div>
        <div class="form-group">
            <label>Metros Cuadrados (m²)</label>
            <input type="number" id="cantidad" value="1" min="1" oninput="calcularPresupuesto()">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="incluirCarateo" onchange="calcularPresupuesto()">
            <label for="incluirCarateo" style="margin:0;">Incluir Carateo (Junta del mismo color)</label>
        </div>

        <div class="resumen">
            <div class="item-resumen"><span>Subtotal Losa:</span> <span id="subLosa">$ 0.00</span></div>
            <div class="item-resumen" id="rowCarateo" style="display:none;"><span>Subtotal Carateo:</span> <span id="subCarateo">$ 0.00</span></div>
            <div class="total-box" id="totalFinal">$ 0.00</div>
        </div>

        <button type="button" class="btn-submit" id="btnEnviar" onclick="enviarSolicitud()">Enviar Solicitud a Fábrica</button>
        <div id="mensajeExito">¡Solicitud enviada con éxito! Te contactaremos pronto.</div>
    </form>
</div>

<script>
    // URLs proporcionadas por Eduardo
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQS2jTGOpkjdFZM116nP9MLIoOgMNKB9Yl48duVoOUUrdmliZF9ji_rdsX7nK8dN5rvjxQx0H-OF7k7/pub?gid=0&single=true&output=csv";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";
    
    let db = [];
    let precioLosaActual = 0;

    // Cargar CSV al iniciar
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: function(results) {
            db = results.data.filter(row => row.FORMATO); // Filtra filas vacías
            poblarFormatos();
        }
    });

    function poblarFormatos() {
        const formatos = [...new Set(db.map(item => item.FORMATO))];
        const select = document.getElementById('formato');
        select.innerHTML = '<option value="">Seleccione Formato</option>';
        formatos.forEach(f => select.add(new Option(f, f)));
    }

    function filtrarTexturas() {
        const formatoSeleccionado = document.getElementById('formato').value;
        const texturas = [...new Set(db.filter(item => item.FORMATO === formatoSeleccionado).map(item => item.TEXTURA))];
        
        const select = document.getElementById('textura');
        select.innerHTML = '<option value="">Seleccione Textura</option>';
        texturas.forEach(t => select.add(new Option(t, t)));
        select.disabled = false;
        
        document.getElementById('color').innerHTML = '<option value="">Seleccione una Textura primero</option>';
        document.getElementById('color').disabled = true;
        calcularPresupuesto();
    }

    function filtrarColores() {
        const formatoSeleccionado = document.getElementById('formato').value;
        const texturaSeleccionada = document.getElementById('textura').value;
        
        const colores = [...new Set(db.filter(item => item.FORMATO === formatoSeleccionado && item.TEXTURA === texturaSeleccionada).map(item => item.COLOR))];
        
        const select = document.getElementById('color');
        select.innerHTML = '<option value="">Seleccione Color</option>';
        colores.forEach(c => select.add(new Option(c, c)));
        select.disabled = false;
        calcularPresupuesto();
    }

    function calcularPresupuesto() {
        const formato = document.getElementById('formato').value;
        const textura = document.getElementById('textura').value;
        const color = document.getElementById('color').value;
        const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
        const quiereCarateo = document.getElementById('incluirCarateo').checked;

        if (!formato || !textura || !color) {
            document.getElementById('totalFinal').innerText = "$ 0.00";
            return;
        }

        // Buscar precio de la losa en la base de datos
        const producto = db.find(item => item.FORMATO === formato && item.TEXTURA === textura && item.COLOR === color);
        precioLosaActual = producto ? parseFloat(producto.PRECIO_USD) : 0;
        
        let subtotalLosa = precioLosaActual * cantidad;
        document.getElementById('subLosa').innerText = `$ ${subtotalLosa.toFixed(2)}`;

        // Lógica de Precio de Carateo (Calculado en JS, incluye 15%)
        let subtotalCarateo = 0;
        if (quiereCarateo) {
            let precioKiloCarateo = 5.75; // Base color vivo con 15%
            if (color === "Gris Claro") precioKiloCarateo = 3.45; // 3 * 1.15
            else if (color === "Beige" || color === "Gris 1%") precioKiloCarateo = 4.60; // 4 * 1.15
            else if (color === "Gris 2%") precioKiloCarateo = 5.75; // 5 * 1.15
            else if (color === "Gris 3%") precioKiloCarateo = 6.90; // 6 * 1.15
            else if (color === "Deep Black") precioKiloCarateo = 8.05; // 7 * 1.15

            // Estimación: 1kg de carateo por m2 (Ajustable)
            subtotalCarateo = precioKiloCarateo * cantidad;
            document.getElementById('rowCarateo').style.display = 'flex';
            document.getElementById('subCarateo').innerText = `$ ${subtotalCarateo.toFixed(2)}`;
        } else {
            document.getElementById('rowCarateo').style.display = 'none';
        }

        let total = subtotalLosa + subtotalCarateo;
        document.getElementById('totalFinal').innerText = `$ ${total.toFixed(2)}`;
    }

    function enviarSolicitud() {
        const btn = document.getElementById('btnEnviar');
        const nombre = document.getElementById('clienteNombre').value;
        const telefono = document.getElementById('clienteTelefono').value;
        const formato = document.getElementById('formato').value;
        const textura = document.getElementById('textura').value;
        const color = document.getElementById('color').value;
        const cantidad = document.getElementById('cantidad').value;
        const total = document.getElementById('totalFinal').innerText;

        if(!nombre || !telefono || !formato || !color) {
            alert("Por favor, completa todos los campos del formulario.");
            return;
        }

        btn.innerText = "Enviando...";
        btn.disabled = true;

        // Crear los datos a enviar
        const formData = new FormData();
        formData.append("Nombre", nombre);
        formData.append("Telefono", telefono);
        formData.append("Formato", formato);
        formData.append("Textura", textura);
        formData.append("Color", color);
        formData.append("Metros", cantidad);
        formData.append("Total", total);

        // Fetch hacia tu Web App
        fetch(WEB_APP_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // Vital para evitar errores de Google
        })
        .then(() => {
            document.getElementById('cotizadorForm').reset();
            document.getElementById('subLosa').innerText = "$ 0.00";
            document.getElementById('totalFinal').innerText = "$ 0.00";
            document.getElementById('rowCarateo').style.display = 'none';
            document.getElementById('mensajeExito').style.display = 'block';
            btn.innerText = "Enviar Solicitud a Fábrica";
            btn.disabled = false;
            setTimeout(() => { document.getElementById('mensajeExito').style.display = 'none'; }, 5000);
        })
        .catch(error => {
            alert("Hubo un error al enviar. Intenta de nuevo.");
            btn.innerText = "Enviar Solicitud a Fábrica";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
