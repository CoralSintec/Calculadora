<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotizador Coralsintec</title>
    <style>
        :root { --coralsintec-primary: #1e2328; --coralsintec-accent: #c49660; --coralsintec-text-main: #334155; --coralsintec-border: #cbd5e1; }
        html, body { min-height: 100vh; margin: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-image: url('1000556091.jpg'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--coralsintec-text-main); padding: 40px 15px 50px 15px; display: flex; flex-direction: column; align-items: center; }
        .app-main { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(8px); padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; box-sizing: border-box; border-top: 6px solid var(--coralsintec-primary); }
        .section-title { font-size: 20px; color: var(--coralsintec-primary); margin: 0 0 5px 0; font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .section-subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 20px; font-weight: 500; }
        h3 { color: var(--coralsintec-primary); font-size: 14px; text-transform: uppercase; border-left: 4px solid var(--coralsintec-accent); padding-left: 10px; margin-top: 0; margin-bottom: 15px;}
        .form-row { margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; }
        select, input[type="number"], input[type="text"], input[type="tel"] { width: 100%; padding: 14px; border: 2px solid var(--coralsintec-border); border-radius: 10px; font-size: 15px; background-color: rgba(248, 250, 252, 0.9); color: var(--coralsintec-primary); appearance: none; box-sizing: border-box; font-weight: 700; }
        select:focus, input:focus { outline: none; border-color: var(--coralsintec-primary); background-color: #fff; }
        .options-group { background: rgba(248, 250, 252, 0.8); border-radius: 10px; padding: 15px; margin-top: 20px; border: 1px solid var(--coralsintec-border); }
        .option-item { display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 800; padding: 8px 0; color: var(--coralsintec-primary); }
        .option-item input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--coralsintec-accent); }
        .results-card { margin-top: 25px; padding: 20px; background-color: var(--coralsintec-primary); border-radius: 12px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-left: 4px solid var(--coralsintec-accent); }
        .breakdown-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: #cbd5e1; align-items: center; }
        .breakdown-val { font-weight: 800; color: white; font-size: 14px; }
        .divider { height: 1px; background: rgba(255,255,255,0.2); margin: 12px 0; }
        .total-price-container { text-align: center; margin-top: 15px; }
        .total-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; font-weight: 600; }
        .total-price { font-size: 32px; font-weight: 900; color: var(--coralsintec-accent); margin: 5px 0 0 0; }
        .btn-add-outline { width: 100%; background-color: white; color: var(--coralsintec-primary); border: 2px solid var(--coralsintec-primary); padding: 16px; border-radius: 10px; font-size: 14px; font-weight: 900; text-transform: uppercase; margin-top: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-add-outline:hover { background: var(--coralsintec-primary); color: white; }
        .btn-add-outline:active { transform: scale(0.97); }
        .btn-submit { width: 100%; border: none; padding: 16px; border-radius: 10px; font-size: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: transform 0.1s; background-color: #166534; color: white; box-shadow: 0 5px 15px rgba(22,101,52,0.4); margin-top: 15px;}
        .btn-submit:active { transform: scale(0.97); }
        .cart-section { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); margin-top: 20px; box-sizing: border-box; border-top: 6px solid var(--coralsintec-primary); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        .cart-header h2 { font-size: 16px; margin: 0; color: var(--coralsintec-primary); font-weight: 900;}
