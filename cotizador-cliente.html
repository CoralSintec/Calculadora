<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Cotizador Web | Coralsintec</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #1c1c1c; --card-bg: #2d2d2d; --input-bg: #3a3a3a; --border: #555555; --text-main: #e0e0e0; --text-muted: #9ca3af; --green: #10b981; --blue: #3b82f6; --accent: #b0b0b0;}
        body { font-family: -apple-system, sans-serif; background-image: linear-gradient(rgba(28,28,28,0.95), rgba(28,28,28,0.95)), url('cabecera.jpg'); background-size: cover; background-attachment: fixed; margin: 0; padding: 15px; color: var(--text-main);}
        .app-main { width: 100%; max-width: 420px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px;}
        .user-badge { background: var(--input-bg); color: #fff; border: 1px solid var(--blue); padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center; flex: 1;}
        .btn-catalogo { background: #d1d5db; color: #1c1c1c; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase;}
        .header { text-align: center; margin-bottom: 20px;}
        .header h2 { margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase;}
        .section-title { font-size: 13px; font-weight: 900; color: #fff; margin: 0 0 15px 0; border-left: 4px solid var(--accent); padding-left: 8px; text-transform: uppercase;}
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #404040; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--input-bg); color: #fff; border-radius: 8px; box-sizing: border-box; font-weight: bold;}
        .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #404040;}
        .price-badge { background: #374151; color: #d1d5db; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 900;}
        .btn-add { background: transparent; color: #fff; border: 1px solid #555; padding: 14px; width: 100%; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .cart-item { background: var(--input-bg); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid var(--blue); position: relative;}
        .cart-item-price { font-weight: 900; color: #10b981; font-size: 16px; text-align: right;}
        .total-box { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border);}
        .total-box b { font-size: 24px; color: #fff; }
        .btn-send { background: var(--blue); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28,28,28,0.95); display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent); z-index: 1000;}
    </style>
</head>
<body>
    <div id="loader"><span>⏳ Cargando Catálogo Oficial...</span></div>
    <main class="app-main">
        <div class="top-bar">
            <div class="user-badge">🌐 COTIZADOR WEB OFICIAL</div>
            <button class="btn-catalogo" onclick="window.open('catalogo.pdf', '_blank')">📖 CATÁLOGO</button>
        </div>
        <div class="header"><h2>CORALSINTEC</h2><p>Arma tu presupuesto en línea</p></div>
        <div class="section-title">1. SELECCIONA EL MATERIAL</div>
        <div class="form-card">
            <div class="form-group"><label>Formato</label><select id="sel-formato" onchange="filtrarUsos()"></select></div>
            <div class="form-group"><label>Uso</label><select id="sel-uso" onchange="filtrarTexturas()"></select></div>
            <div class="form-group"><label>Textura</label><select id="sel-textura" onchange="filtrarColores()"></select></div>
            <div class="form-group"><label>Color</label><select id="sel-color" onchange="actualizarUI()"></select></div>
            <div class="form-group" style="background:#1c1c1c; padding:10px; border-radius:8px; display:flex; justify-content:space-between;">
                <span style="font-size:10px; font-weight:800; color:#9ca3af;">PRECIO UNITARIO:</span>
                <span id="precio-ui" style="color:#10b981; font-weight:900;">$0.00</span>
            </div>
            <div class="form-group"><label>Cantidad (m²)</label><input type="number" id="inp-cantidad" value="1"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-carateo"><label for="chk-carateo">Incluir Carateo</label>
                <span class="price-badge" id="badge-carateo">Automático</span>
            </div>
            <button class="btn-add" onclick="agregar()">AGREGAR A MI LISTA</button>
        </div>
        <div class="section-title">2. TU LISTA</div>
        <div class="form-card">
            <div id="carrito-container"></div>
            <div class="total-box"><span>TOTAL ESTIMADO</span><br><b id="gran-total">$0.00</b></div>
        </div>
        <div class="section-title">3. ENVÍO</div>
        <div class="form-card">
            <input type="text" id="cli-nombre" placeholder="NOMBRE COMPLETO" style="margin-bottom:10px;">
            <input type="text" id="cli-telefono" placeholder="WHATSAPP">
            <button class="btn-send" onclick="enviar()">ENVIAR SOLICITUD</button>
        </div>
    </main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzi0UF7LhZMY_uleacnFoSKiaWqHgtz_ItLOMN1y8P_smj3sH0W3SdhPWrs2ihFYaZL6A/exec";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQS2jTGOpkjdFZM116nP9MLIoOgMNKB9Yl48duVoOUUrdmliZF9ji_rdsX7nK8dN5rvjxQx0H-OF7k7/pub?gid=0&single=true&output=csv";
    let db = []; let carrito = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(r) { db = r.data.filter(x => x.FORMATO); poblar(); document.getElementById('loader').style.display='none'; }
        });
    };

    function poblar() {
        let f = [...new Set(db.map(x => x.FORMATO))];
        let s = document.getElementById('sel-formato');
        s.innerHTML = '<option value="">-- Seleccione --</option>';
        f.forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function filtrarUsos() {
        let f = document.getElementById('sel-formato').value;
        let u = [...new Set(db.filter(x => x.FORMATO === f).map(x => x.USO))];
        let s = document.getElementById('sel-uso');
        s.innerHTML = '<option value="">-- Uso --</option>';
        u.forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function filtrarTexturas() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = [...new Set(db.filter(x => x.FORMATO === f && x.USO === u).map(x => x.TEXTURA))];
        let s = document.getElementById('sel-textura');
        s.innerHTML = '<option value="">-- Textura --</option>';
        t.forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function filtrarColores() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = document.getElementById('sel-textura').value;
        let c = [...new Set(db.filter(x => x.FORMATO === f && x.USO === u && x.TEXTURA === t).map(x => x.COLOR))];
        let s = document.getElementById('sel-color');
        s.innerHTML = '<option value="">-- Color --</option>';
        c.forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function calcCarateo(color) {
        if(!color) return 0;
        let c = color.toLowerCase();
        let base = 55.00; let pigmento = 0;
        if(c.includes('beige')) return 60 * 1.15;
        if(c.includes('gris 1%')) pigmento = 2.34;
        else if(c.includes('gris 2%')) pigmento = 4.68;
        else if(c.includes('gris 3%')) pigmento = 7.02;
        else if(c.includes('black')) pigmento = 9.36;
        else if(!c.includes('gris claro')) {
            if(c.includes('1%')) pigmento = 5;
            else if(c.includes('2%')) pigmento = 10;
            else if(c.includes('3%')) pigmento = 15;
            else pigmento = 5;
        }
        return (base + pigmento) * 1.15;
    }

    function actualizarUI() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = document.getElementById('sel-textura').value;
        let c = document.getElementById('sel-color').value;
        let p = db.find(x => x.FORMATO===f && x.USO===u && x.TEXTURA===t && x.COLOR===c);
        if(p) {
            document.getElementById('precio-ui').innerText = `$${parseFloat(p.PRECIO_USD).toFixed(2)}`;
            document.getElementById('badge-carateo').innerText = `$${calcCarateo(c).toFixed(2)} / Saco`;
        }
    }

    function agregar() {
        let f = document.getElementById('sel-formato').value;
        let u = document.getElementById('sel-uso').value;
        let t = document.getElementById('sel-textura').value;
        let c = document.getElementById('sel-color').value;
        let cant = parseFloat(document.getElementById('inp-cantidad').value);
        let p = db.find(x => x.FORMATO===f && x.USO===u && x.TEXTURA===t && x.COLOR===c);
        if(!p || !cant) return alert("Faltan datos.");
        let pCar = calcCarateo(c);
        let carCant = document.getElementById('chk-carateo').checked ? Math.ceil(cant/40) : 0;
        carrito.push({ id: Date.now(), formato: f, color: c, cant: cant, total: (cant*p.PRECIO_USD) + (carCant*pCar) });
        render();
    }

    function render() {
        let cont = document.getElementById('carrito-container'); let t = 0; cont.innerHTML = "";
        carrito.forEach(x => {
            t += x.total;
            cont.innerHTML += `<div class="cart-item"><b>${x.cant} m² - ${x.formato}</b><br><small>${x.color}</small><div class="cart-item-price">$${x.total.toFixed(2)}</div></div>`;
        });
        document.getElementById('gran-total').innerText = `$${t.toFixed(2)}`;
    }

    function enviar() {
        if(!carrito.length) return alert("Carrito vacío.");
        document.getElementById('loader').style.display='flex';
        fetch(API_URL + "?action=guardar_solicitud", {
            method:"POST", mode:"no-cors",
            body: JSON.stringify({ cliente: document.getElementById('cli-nombre').value, telefono: document.getElementById('cli-telefono').value, total_usd: carrito.reduce((s,i)=>s+i.total,0), detalles_json: JSON.stringify(carrito) })
        }).finally(() => { alert("Enviado!"); location.reload(); });
    }
</script>
</body>
</html>
